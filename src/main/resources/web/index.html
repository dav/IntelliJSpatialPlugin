<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spatial</title>
    <style>
        :root { color-scheme: dark; }
        html, body { margin: 0; height: 100%; background: #1e1f22; color: #cdd0d4; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        #stage { position: fixed; inset: 0; }
        #hud {
            position: fixed; left: 0; right: 0; bottom: 0; padding: 8px 12px;
            font-size: 12px; opacity: 0.78; pointer-events: none;
            background: linear-gradient(to top, rgba(0,0,0,0.42), transparent);
        }
        #empty {
            position: fixed; inset: 0; display: flex; align-items: center;
            justify-content: center; text-align: center; padding: 24px;
            font-size: 13px; color: #8a8f96; pointer-events: none;
        }
        #empty.hidden { display: none; }
        #speech {
            position: fixed; top: 12px; left: 12px; right: 130px;
            padding: 10px 14px; border-radius: 6px; background: rgba(30, 31, 34, 0.88);
            border: 1px solid rgba(255,255,255,0.1); font-size: 13px;
            opacity: 0; transition: opacity 240ms ease-out; pointer-events: none;
        }
        #speech.visible { opacity: 1; }
        #notice {
            position: fixed; top: 62px; left: 50%; transform: translateX(-50%);
            padding: 8px 12px; border-radius: 999px; background: rgba(30, 31, 34, 0.92);
            border: 1px solid rgba(255,255,255,0.12); font-size: 12px; color: #d7dbe0;
            opacity: 0; transition: opacity 180ms ease-out; pointer-events: none;
            white-space: nowrap;
        }
        #notice.visible { opacity: 1; }
        #controls {
            position: fixed; right: 12px; bottom: 44px; display: none; flex-direction: column;
            gap: 8px; min-width: 168px; padding: 10px 12px;
            border-radius: 8px; background: rgba(30, 31, 34, 0.92);
            border: 1px solid rgba(255,255,255,0.12); box-shadow: 0 10px 30px rgba(0,0,0,0.24);
        }
        #controls.visible { display: flex; }
        #controls-title { font-size: 12px; opacity: 0.88; }
        #controls-value { font-size: 11px; opacity: 0.68; }
        #controls-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
            align-items: center; justify-items: center;
        }
        #controls-grid button, #controls-close {
            width: 100%; background: rgba(50, 53, 59, 0.9); color: #d7dbe0;
            border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; padding: 8px 0;
            font-size: 14px; cursor: pointer; font-family: inherit;
        }
        #controls-grid button:hover, #controls-close:hover { background: rgba(66, 70, 77, 0.95); }
        #controls-grid .spacer { width: 100%; height: 100%; }
        #toolbar {
            position: fixed; top: 10px; right: 10px; display: flex; gap: 6px;
        }
        #toolbar button {
            background: rgba(40, 42, 46, 0.85); color: #cdd0d4;
            border: 1px solid rgba(255,255,255,0.12); border-radius: 4px;
            padding: 5px 10px; font-size: 12px; cursor: pointer;
            font-family: inherit;
        }
        #toolbar button:hover { background: rgba(60, 63, 70, 0.95); }
        #toolbar button:active { background: rgba(30, 31, 34, 0.95); }
        #scrub {
            position: fixed; left: 50%; bottom: 36px; transform: translateX(-50%);
            display: none; align-items: center; gap: 10px;
            background: rgba(30, 31, 34, 0.88); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px; padding: 8px 14px; font-size: 12px; color: #cdd0d4;
            min-width: 360px;
        }
        #scrub.visible { display: flex; }
        #scrub-range { flex: 1; accent-color: #4a90e2; }
        #scrub-label { min-width: 90px; text-align: right; opacity: 0.8; }
        #scrub-tip { opacity: 0.6; }
    </style>
</head>
<body>
    <div id="stage"></div>
    <div id="toolbar">
        <button id="btn-fit" title="Frame all entities">Fit</button>
        <button id="btn-recenter" title="Reset camera to default pose">Recenter</button>
    </div>
    <div id="speech"></div>
    <div id="notice"></div>
    <div id="controls">
        <div id="controls-title">Interactive Control</div>
        <div id="controls-value">x 0.00 · z 0.00 · heading 0°</div>
        <div id="controls-grid">
            <button id="controls-turn-left" title="Turn left">↺</button>
            <button id="controls-forward" title="Move forward">↑</button>
            <button id="controls-turn-right" title="Turn right">↻</button>
            <div class="spacer"></div>
            <button id="controls-backward" title="Move backward">↓</button>
            <div class="spacer"></div>
        </div>
        <button id="controls-close" title="Hide controls">Hide</button>
    </div>
    <div id="empty">Scene is empty. Ask the IDE AI agent to call a Spatial MCP tool.</div>
    <div id="hud"><span id="hud-count">0</span> entities · click to open · double-click to focus · drag to orbit · right-drag to pan · scroll to zoom</div>
    <div id="scrub">
        <span id="scrub-tip">◂ scrub time</span>
        <input id="scrub-range" type="range" min="0" max="0" step="1" value="0">
        <span id="scrub-label">—</span>
    </div>

    <script>
      // Bridge back to Kotlin. Populated by the plugin so scene.js can send events.
      window.__spatialSend = function (payload) { /*__SPATIAL_BRIDGE_INJECTION__*/ };
    </script>
    <script>/*__SPATIAL_THREE_INJECTION__*/</script>
    <script>/*__SPATIAL_SCENE_INJECTION__*/</script>
</body>
</html>
