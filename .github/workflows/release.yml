# GitHub Actions Workflow created for publishing installable plugin ZIPs to GitHub Releases.
# Publish by pushing a tag like `v0.1.1` after bumping `gradle.properties` version to `0.1.1`.

name: GitHub Release
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build And Publish Release ZIP
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      - name: Fetch Sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      - name: Validate tag matches plugin version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(sed -n 's/^version = //p' gradle.properties)"
          if [[ -z "$VERSION" ]]; then
            echo "Could not read version from gradle.properties"
            exit 1
          fi
          if [[ "$TAG" != "$VERSION" ]]; then
            echo "Tag version ($TAG) does not match gradle.properties version ($VERSION)"
            exit 1
          fi

      - name: Build plugin ZIP
        run: ./gradlew buildPlugin

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          TITLE="Spatial ${TAG}"
          NOTES="Install the attached plugin ZIP from disk in a compatible JetBrains IDE: Settings/Preferences > Plugins > gear icon > Install Plugin from Disk..."

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" ./build/distributions/* --clobber
            gh release edit "$TAG" --title "$TITLE" --notes "$NOTES"
          else
            gh release create "$TAG" ./build/distributions/* --title "$TITLE" --notes "$NOTES"
          fi
